name: Update Google Scholar stats

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Fetch Scholar stats
        timeout-minutes: 2
        env:
          SCHOLAR_ID: Xs_dNn4AAAAJ
        run: python .github/scripts/update_scholar.py

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain _data/scholar.yml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _data/scholar.yml
            git commit -m "chore: update Google Scholar stats"
            git push
          else
            echo "No changes to commit."
          fi
